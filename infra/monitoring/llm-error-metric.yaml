description: "Count of failed Vertex Gemini calls"

filter: |
  resource.type="cloud_run_revision"
  AND resource.labels.service_name="roboqc-agent"
  AND jsonPayload.event="llm_error"

metricDescriptor:
  metricKind: DELTA
  valueType: INT64
  unit: "1"
  displayName: "RoboQC LLM errors (count)"

labelExtractors:
  model: EXTRACT(jsonPayload.model)
  operation: EXTRACT(jsonPayload.operation)
