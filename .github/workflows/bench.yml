name: bench

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "bench/**"
      - "src/roboqc_agent/**"

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Benchmark placeholder
        run: python bench/bench_smt_inspection.py --smoke
